name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: black-vault-cli

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          path: black-vault-cli

      - name: Checkout black-vault-lib dependency
        uses: actions/checkout@v4
        with:
          repository: darknamer/black-vault-lib
          token: ${{ secrets.GIT_TOKEN }}
          ref: main
          path: black-vault-lib

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.x"

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Build
        run: make build

      - name: Run tests
        run: go test ./...

      - name: Create or update GitHub release v0.1.0
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          set -euo pipefail

          TAG="v0.1.0"
          ASSET_PATH="blackvault"

          if ! [ -f "$ASSET_PATH" ]; then
            echo "Asset $ASSET_PATH not found"
            exit 1
          fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG exists, cleaning up old assets"
            assets=$(gh release view "$TAG" --json assets --jq '.assets[].name')
            for asset in $assets; do
              gh release delete-asset "$TAG" "$asset" -y
            done

            echo "Uploading new asset"
            gh release upload "$TAG" "$ASSET_PATH" --clobber
          else
            echo "Creating release $TAG"
            gh release create "$TAG" "$ASSET_PATH" --title "$TAG" --notes "Release $TAG"
          fi

